<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Love Letter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Poppins,sans-serif;
height:100vh;overflow:hidden;
display:flex;justify-content:center;align-items:center;
background:linear-gradient(-45deg,#0b1026,#4c1d95,#2563eb,#ec4899);
background-size:400% 400%;
animation:bg 15s ease infinite;color:#fff}
@keyframes bg{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
.page{position:absolute;display:none;width:min(92%,760px)}
.page.active{display:block}
.card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
padding:28px;border-radius:28px;text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.35)}
h1{font-family:"Great Vibes",cursive;font-size:60px}
.gif{width:220px;height:220px;border-radius:20px;object-fit:cover;border:3px solid rgba(255,255,255,.5);margin:18px auto;display:block}
.key{margin:22px auto 6px;width:90px;height:90px;background:#fff;color:#222;border-radius:18px;
display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:700;
box-shadow:0 8px 0 #bdbdbd;cursor:pointer;transition:.1s}
.key:active{transform:translateY(6px);box-shadow:0 2px 0 #bdbdbd}
.hint{font-size:13px}
.overlay{
position:fixed;inset:0;background:rgba(0,0,0,.45);
display:none;justify-content:center;align-items:center;z-index:999}
.overlay.show{display:flex}
.envelope{
position:relative;width:280px;height:180px;background:#f8d7da;border-radius:0 0 12px 12px}
.envelope:before{
content:"";position:absolute;left:0;top:0;
border-left:140px solid transparent;
border-right:140px solid transparent;
border-top:90px solid #f4b6c2;
transform-origin:top;transition:.6s}
.envelope.open:before{transform:rotateX(180deg)}
.letter{
position:absolute;left:15px;right:15px;bottom:10px;height:135px;
background:#fff;border-radius:10px;color:#333;
display:flex;align-items:center;justify-content:center;font-weight:bold;
transform:translateY(40px);transition:.7s}
.envelope.open .letter{transform:translateY(-110px)}
.heart{position:fixed;bottom:-30px;animation:f linear forwards}
@keyframes f{to{transform:translateY(-115vh) rotate(360deg);opacity:0}}
@keyframes bg{}
</style>
</head>
<body>

<audio id="bgm" src="assets/music.mp3" loop></audio>
<audio id="sfx" src="assets/next.mp3"></audio>

<div class="overlay" id="ov">
<div class="envelope" id="env">
<div class="letter">💌 Love Letter</div>
</div>
</div>

<div class="page active"><div class="card"><h1>Love Begins</h1><img class="gif" src="images/page1.gif"><p>The first page of our story.</p><div class="key" onclick="go()">L</div><div class="hint">Press L to continue</div></div></div>
<div class="page"><div class="card"><h1>Only You</h1><img class="gif" src="images/page2.gif"><p>You are my peace.</p><div class="key" onclick="go()">O</div><div class="hint">Press O to continue</div></div></div>
<div class="page"><div class="card"><h1>Very Special</h1><img class="gif" src="images/page3.gif"><p>Every memory matters.</p><div class="key" onclick="go()">V</div><div class="hint">Press V to continue</div></div></div>
<div class="page"><div class="card"><h1>Endless Love</h1><img class="gif" src="images/page4.gif"><p>I choose you.</p><div class="key" onclick="go()">E</div><div class="hint">Press E to continue</div></div></div>
<div class="page"><div class="card"><h1>Forever ❤️</h1><img class="gif" src="images/final.gif"><p>I Love You Forever</p><div class="key">U</div><div class="hint">Forever</div><div>@ajayyy</div></div></div>

<script>
let i=0,p=[...document.querySelectorAll('.page')];
const ov=document.getElementById('ov'),env=document.getElementById('env');
const bgm=document.getElementById('bgm'),sfx=document.getElementById('sfx');
document.body.addEventListener('click',()=>bgm.play().catch(()=>{}),{once:true});
function go(){
 if(i>=p.length-1)return;
 sfx.currentTime=0;sfx.play().catch(()=>{});
 ov.classList.add('show');
 setTimeout(()=>env.classList.add('open'),80);
 setTimeout(()=>{
   env.classList.remove('open');
   ov.classList.remove('show');
   p[i].classList.remove('active');
   i++;
   p[i].classList.add('active');
 },1200);
}
document.addEventListener('keydown',e=>{
 const need=['l','o','v','e'];
 if(i<4&&e.key.toLowerCase()==need[i])go();
});
setInterval(()=>{
 let h=document.createElement('div');
 h.className='heart';
 h.textContent=Math.random()>.5?'❤️':'💖';
 h.style.left=Math.random()*100+'vw';
 h.style.fontSize=(18+Math.random()*20)+'px';
 h.style.animationDuration=(5+Math.random()*5)+'s';
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),10000);
},220);
</script>
</body></html>
